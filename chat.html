<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp BB84 - Secure Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="conversionModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Quantum Encryption Step-by-Step</h2>
            <p id="key-info" style="color: #128c7e; font-weight: bold;"></p>
            
            <div class="table-container">
                <table id="conversionTable">
                    <thead>
                        <tr>
                            <th>Char</th>
                            <th>ASCII</th>
                            <th>Binary</th>
                            <th>XOR (Key)</th>
                            <th>Final Result</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body">
                        </tbody>
                </table>
            </div>
            
            <div style="margin-top: 20px;">
                <button class="confirm-btn" onclick="confirmAndSend()">Confirm & Send to Network</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Chats</h3>
                <select id="user-role" onchange="setRole()" style="width: 100%; margin-top: 10px; padding: 5px; border-radius: 5px;">
                    <option value="Alice">I am Alice</option>
                    <option value="Bob">I am Bob</option>
                </select>
            </div>
            
            <div class="contact active">
                <div class="avatar">B</div>
                <div class="info"><strong>Bob</strong><br><small>Quantum Secured</small></div>
            </div>
            <div class="contact">
                <div class="avatar" style="background:#e74c3c">E</div>
                <div class="info"><strong>Eve</strong><br><small>Disconnected</small></div>
            </div>
        </aside>

        <main class="chat-window">
            <header class="chat-header">
                <h3 id="chat-with">Chatting with: Bob</h3>
                <span id="key-status" style="font-family: monospace; background: #ddd; padding: 2px 8px; border-radius: 4px;">Key: None</span>
            </header>

            <div id="chat-box" class="chat-box"></div>

            <footer class="input-area">
    <button class="bb84-btn" style="flex: 0 0 auto;" onclick="generateBB84Key()">Key Gen</button>
    <input type="text" id="msg-input" placeholder="Secure message..." style="flex: 1;">
    <button class="send-btn" style="flex: 0 0 auto;" onclick="sendMessage()">Send</button>
</footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
