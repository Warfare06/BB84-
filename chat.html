<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum WhatsApp - BB84</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="conversionModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--teal-light);">Quantum Encryption Process</h2>
            <p id="key-info"></p>
            
            <div class="table-container">
                <table id="conversionTable">
                    <thead>
                        <tr>
                            <th>Char</th>
                            <th>ASCII</th>
                            <th>Binary</th>
                            <th>XOR (Key)</th>
                            <th>Final Result</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body"></tbody>
                </table>
            </div>
            
            <button class="confirm-btn" onclick="confirmAndSend()">CONFIRM & SEND TO NETWORK</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Chats</h3>
                <select id="user-role" onchange="setRole()" style="width: 100%; margin-top: 10px; background: #222; color: white; border: 1px solid var(--teal-main);">
                    <option value="Alice">I am Alice</option>
                    <option value="Bob">I am Bob</option>
                </select>
            </div>
            
            <div class="contact active">
                <div class="avatar">B</div>
                <div class="info"><strong>Bob</strong> <small>• Secured</small></div>
            </div>
            <div class="contact">
                <div class="avatar" style="background:#e74c3c">E</div>
                <div class="info"><strong>Eve</strong> <small>• Offline</small></div>
            </div>
        </aside>

        <main class="chat-window">
            <header class="chat-header">
                <h3 id="chat-with">Chatting as: Alice</h3>
                <span id="key-status">Key: None</span>
            </header>

            <div id="chat-box" class="chat-box">
                </div>

            <footer class="input-area">
                <button class="bb84-btn" onclick="generateBB84Key()">KEY GEN</button>
                <input type="text" id="msg-input" placeholder="Type secure message..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">SEND</button>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
