<!DOCTYPE html>
<html>
<head>
    <title>BB84 Secure Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="sidebar">

        <h2>Contacts</h2>
        <p>Alice</p>
        <p>Bob</p>
        <p>Eve</p>
    </div>

    <div class="chat">
        <div class="messages" id="messages"></div>

        <div class="input-box">
            <input type="text" id="msg" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
